<script>
(function() {
  // ── IntersectionObserver scroll-reveal ──
  function initReveal() {
    var els = document.querySelectorAll('.reveal');
    if (!els.length) return;

    if (!('IntersectionObserver' in window)) {
      // fallback: show all immediately
      els.forEach(function(el) { el.classList.add('visible'); });
      return;
    }

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('visible');
          observer.unobserve(entry.target);
        }
      });
    }, { threshold: 0.1, rootMargin: '0px 0px -40px 0px' });

    els.forEach(function(el) { observer.observe(el); });
  }

  // ── CountUp animation for stat numbers ──
  function countUp(el, target, duration) {
    var start = 0;
    var startTime = null;
    var isFloat = String(target).indexOf('.') !== -1;

    function step(timestamp) {
      if (!startTime) startTime = timestamp;
      var progress = Math.min((timestamp - startTime) / duration, 1);
      // ease out cubic
      var eased = 1 - Math.pow(1 - progress, 3);
      var current = eased * target;
      el.textContent = isFloat
        ? current.toFixed(1)
        : Math.floor(current).toLocaleString();
      if (progress < 1) requestAnimationFrame(step);
      else el.textContent = isFloat ? target.toFixed(1) : target.toLocaleString();
    }
    requestAnimationFrame(step);
  }

  function initCountUp() {
    var cards = document.querySelectorAll('.stat-card');
    if (!cards.length) return;

    var observer = new IntersectionObserver(function(entries) {
      entries.forEach(function(entry) {
        if (!entry.isIntersecting) return;
        var numEl = entry.target.querySelector('.stat-number');
        if (!numEl || numEl.dataset.counted) return;
        numEl.dataset.counted = '1';
        var raw = numEl.textContent.trim();
        // handle suffixes like "5+"
        var suffix = raw.replace(/[\d.,]/g, '');
        var num = parseFloat(raw.replace(/[^\d.]/g, ''));
        if (!isNaN(num)) {
          numEl.textContent = '0';
          countUp({ textContent: '0', set textContent(v) { numEl.textContent = v + suffix; } }, num, 1200);
        }
        observer.unobserve(entry.target);
      });
    }, { threshold: 0.5 });

    cards.forEach(function(card) { observer.observe(card); });
  }

  function init() {
    initReveal();
    initCountUp();
  }

  // Run on initial load and on Hydejack push-state navigation
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }

  var pushState = document.getElementById('_pushState');
  if (pushState) {
    pushState.addEventListener('hy-push-state-load', init);
  }
})();
</script>
